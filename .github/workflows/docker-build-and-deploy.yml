name: build-and-push

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 설치 + npm cache
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # QEMU → ARM 빌드 가능
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Buildx → multi arch build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR 로그인
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker 메타데이터 (tag 자동 생성)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch

      # Build & Push
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true

          platforms: linux/amd64,linux/arm64

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      # Jenkins 배포
      - name: Trigger Jenkins
        run: |
          CRUMB=$(curl -s 'https://builds.jjoon.cloud/crumbIssuer/api/xml?xpath=concat(//crumbRequestField,":",//crumb)' \
            --user deploy:${{ secrets.JENKINS_TOKEN }})
            
          curl -X POST "https://builds.jjoon.cloud/job/flowops/build?token=GITHUB_TRIGGER" \
            -H "$CRUMB" \
            --user deploy:${{ secrets.JENKINS_TOKEN }}
